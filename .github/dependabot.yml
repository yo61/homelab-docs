version: 2
updates:
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      hooks:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # TypeScript 7.x is the native (Go) compiler rewrite; Next.js/Fumadocs tooling
      # doesn't support it yet (the build can't detect it). Revisit when they do.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
